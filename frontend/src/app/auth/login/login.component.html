<div class="login-wrapper">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Acesso TechSolution</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form #f="ngForm" (ngSubmit)="efetuarLogin()" class="flex-column">
        <mat-form-field appearance="outline">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" name="email" [(ngModel)]="usuario.email" required>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput type="password" name="senha" [(ngModel)]="usuario.senha" required>
        </mat-form-field>
        <button mat-raised-button color="primary" [disabled]="!f.valid">Entrar</button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
