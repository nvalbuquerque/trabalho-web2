<div class="login-container">
  <app-card-visualizacao>
    <div class="header-text">
      <h1>Login TechSolution</h1>
      <hr class="divider">
    </div>

    <form (ngSubmit)="efetuarLogin()">
      <app-input-card label="Acesso ao Sistema" largura="100%">
        
        <div class="field-group">
          <label class="label-padrao">E-mail</label>
          <input 
            type="email"
            class="input-customizado"
            placeholder="exemplo@email.com"
            [(ngModel)]="credenciais.email"
            name="email"
            (blur)="marcarComoTocado('email')"
            style="height: 52px; width: 100%;">
          
          <div class="container-erro">
            <span class="msg-erro" *ngIf="!credenciais.email && (emailTocado || enviou)">
              O e-mail é obrigatório.
            </span>
          </div>
        </div>

        <div class="field-group">
          <label class="label-padrao">Senha</label>
          <input 
            type="password" 
            class="input-customizado"
            placeholder="Digite sua senha"
            [(ngModel)]="credenciais.senha"
            name="senha"
            (blur)="marcarComoTocado('senha')"
            style="height: 52px; width: 100%;">
          
          <div class="container-erro">
            <span class="msg-erro" *ngIf="!credenciais.senha && (senhaTocado || enviou)">
              A senha é obrigatória.
            </span>
          </div>
        </div>

      </app-input-card>

      <div class="acoes-login">
        <app-botao-aprovar (clicou)="efetuarLogin()">
          Entrar
        </app-botao-aprovar>
      </div>
    </form>
  </app-card-visualizacao>
</div>
