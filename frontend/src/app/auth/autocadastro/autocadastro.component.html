<div class="cadastro-container">
  <app-card-visualizacao>
    <div class="header-text">
      <h1>Crie sua conta</h1>
      <p>Preencha as informações para criar sua conta no sistema</p>
      <hr class="divider">
    </div>

    <form #f="ngForm" (ngSubmit)="onSubmit(f)">
      
      <div class="secao-ajustada">
        <h3 class="titulo-secao">Dados Pessoais</h3>
        <div class="wrapper-individual">
        <app-input titulo="Nome Completo" [valor]="usuario.nome" (mudou)="usuario.nome = $event" altura="34px" largura="100%"></app-input>
        </div>

        <div class="linha-flex-ajustada recuo-superior">
          <div class="flex-1">
            <app-input titulo="CPF" [valor]="usuario.cpf" (mudou)="aplicarMascaraCPF($event)" altura="34px" largura="100%"></app-input>
          </div>
          <div class="flex-1">
            <app-input titulo="Telefone" [valor]="usuario.telefone" (mudou)="aplicarMascaraTelefone($event)" altura="34px" largura="100%"></app-input>
          </div>
        </div>
      </div>

      <div class="secao-ajustada recuo-superior">
        <h3 class="titulo-secao">Endereço (ViaCEP)</h3>
        <div class="linha-flex-ajustada">
          <div class="flex-1">
            <app-input titulo="CEP" [valor]="usuario.cep" (mudou)="aplicarMascaraCEP($event)" (focusout)="buscarCep()" altura="34px" largura="100%"></app-input>
          </div>
          <div class="flex-1">
            <app-input titulo="Cidade" [valor]="usuario.cidade" altura="34px" largura="100%"></app-input>
          </div>
        </div>
        
        <div class="wrapper-individual recuo-superior">
          <app-input titulo="Logradouro" [valor]="usuario.logradouro" altura="34px" largura="100%"></app-input>
        </div>
      </div>

      <div class="secao-ajustada">
        <h3 class="titulo-secao">Acesso</h3>
        <div class="linha-flex-ajustada">
          <div class="flex-1">
          <app-input titulo="E-mail" [valor]="usuario.email" (mudou)="usuario.email = $event" altura="34px" largura="100%"></app-input>
        </div>
        
        <div class="flex-1">
          <app-input titulo="Senha" type="password" [valor]="usuario.senha" (mudou)="usuario.senha = $event" altura="34px" largura="100%"></app-input>
        </div>
        </div>
      </div>

      <div class="acoes-finais">
        <app-botao-cancelar (clicou)="router.navigate(['/login'])">Já sou cadastrado</app-botao-cancelar>
        <app-botao-aprovar (clicou)="onSubmit(f)">Finalizar Cadastro</app-botao-aprovar>
      </div>
    </form>
  </app-card-visualizacao>
</div>
