<h2 mat-dialog-title>{{ data.titulo }}</h2>

<div mat-dialog-content>

  @switch (data.tipo) {

    @case ('formulario') {
      <div *ngFor="let campo of data.campos">
        <app-input-card [label]="campo.label" [obrigatorio]="campo.obrigatorio ?? false">
            <app-input 
              [tipo]="campo.tipo ?? 'text'"
              [valor]="formData[campo.campo]"
              [obrigatorio]="campo.obrigatorio ?? false"
              [esconderLabel]="true"
              [email]="campo.validacao == 'email'"
              [inteiro]="campo.validacao == 'inteiro'"
              [texto]="campo.validacao == 'texto'"
              [textoNum]="campo.validacao == 'textoNum'"
              [readonly]="campo.readonly ?? false"
              [msgAviso]="campo.msgAviso ?? ''"
              (mudou)="formData[campo.campo] = $event">
          </app-input>
        </app-input-card>
      </div>
    }

    @default {
      <p [innerHTML]="data.mensagem"></p>
    }

  }

</div>

<div mat-dialog-actions>
  <button mat-raised-button color="primary" (click)="confirmar()">
    {{ data.textoConfirmar || 'Confirmar' }}
  </button>

  <button mat-button (click)="cancelar()">
    {{ data.textoCancelar || 'Cancelar' }}
  </button>

</div>
