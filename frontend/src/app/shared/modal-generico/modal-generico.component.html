<div class="modal-overlay" (click)="cancelar()"></div>

<div class="modal-box">

  <mat-dialog-content>

    <h2>{{ data.titulo }}</h2>
    <p>{{ data.mensagem }}</p>

  </mat-dialog-content>

  <mat-dialog-actions align="end">

    <div class="modal-actions">
      <button class="btn-cancelar" (click)="cancelar()">Fechar</button>
    </div>
    
  </mat-dialog-actions>

</div>
