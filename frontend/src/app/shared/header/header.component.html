<header class="header">
    <div class="header__header_title">

    </div>

    <nav class="header_nav">
        <!-- Pendente: adicionarr lógica para ou mostrar rotas para cliente ou para funcionario -->

        <a routerLink="/funcionario/funcionarios">Funcionários</a>
