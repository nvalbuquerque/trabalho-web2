<app-card-visualizacao>

  <h2>Portal do Funcionário</h2>

  <div class="saudacao-funcionario">
    Olá, {{ nomeFuncionario }}!
  </div>

  <div class="aviso-solicitacoes">
  Essas são as solicitações abertas que precisam da sua atenção imediata.
</div>

  <app-tabela
    [colunas]="colunas"
    [dados]="dadosPaginados"
    [acoes]="acoes"
    (acaoClicada)="onAcaoTabela($event)">
  </app-tabela>

  <app-paginacao
    [paginaAtual]="paginaAtual"
    [totalItens]="solicitacoesAbertas.length"
    [itensPorPagina]="itensPorPagina"
    (paginaMudou)="onPaginaMudou($event)">
  </app-paginacao>

</app-card-visualizacao>
