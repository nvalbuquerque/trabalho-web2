<h2>Categoria de Equipamentos</h2>

<table>
  <thead>
    <tr>
      <th>Id</th>
      <th>Nome</th>
      <th>Quantidade</th>
    </tr>
  </thead>

  <tbody>
    @for (categoria of categoriasAtivas; track categoria.id) {
        <tr>
            <td>{{ categoria.id }}</td>
            <td>{{ categoria.nome }}</td>
            <td>{{ categoria.quantidade }}</td>
        </tr>
    }
  </tbody>
</table>

<div class="container-botoes">
    <button class="btn-adicionar">Adicionar categoria</button>
    <button class="btn-atualizar">Atualizar categoria</button>
    <button class="btn-excluir" (click)="mensagemExclusao()">Excluir categoria</button>
</div>
