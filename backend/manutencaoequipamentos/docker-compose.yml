services:
  postgres:
    image: postgres:17
    container_name: manutencao-equipamentos-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: manutencao-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
